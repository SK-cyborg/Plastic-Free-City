<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="favicon (12).ico">
    <title>A Plastic-Free Future</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0a0c10;
            font-family: 'Segoe UI', sans-serif;
        }

        .video-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* Tech HUD scanline overlay */
        .video-container::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 6px 100%;
            z-index: 2;
            pointer-events: none;
        }

        /* Glitched Neon Text Trigger */
        .overlay-title {
            position: relative;
            z-index: 4;
            color: #ffffff;
            font-size: 3rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 0 0 10px #00f3ff, 0 0 20px #ff0055;
            text-align: center;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        .video-container:hover .overlay-title {
            animation: textGlitch 0.3s linear infinite;
        }

        @keyframes textGlitch {
            0% { text-shadow: 2px -2px 0 #ff0055, -2px 2px 0 #00f3ff; }
            25% { text-shadow: -2px 2px 0 #ff0055, 2px -2px 0 #00f3ff; }
            50% { text-shadow: 2px 2px 0 #ff0055, -2px -2px 0 #00f3ff; }
            75% { text-shadow: -2px -2px 0 #ff0055, 2px 2px 0 #00f3ff; }
            100% { text-shadow: 2px -2px 0 #ff0055, -2px 2px 0 #00f3ff; }
        }

        /* Cyberpunk System Disconnect Curtain Layer */
        .black-curtain {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #00f3ff; /* Triggers neon cyan blast flash first */
            z-index: 5;
            opacity: 0;
            pointer-events: none;
            transform: scaleY(0.005); /* Scales down to a thin horizon blip line */
            transition: opacity 0.15s ease, background-color 0.15s ease, transform 0.25s cubic-bezier(0.7, 0, 0.3, 1);
        }

        /* Matrix Crash Sequence States */
        .curtain-flash {
            opacity: 1;
        }

        .curtain-collapse {
            background-color: #ff0055; /* Mid-point warning color swap */
            transform: scaleY(1);
        }

        .curtain-shutdown {
            background-color: #0a0c10; /* Final dark system power down look */
        }

        .hidden {
            opacity: 0;
        }
    </style>
</head>
<body>

    <div class="video-container" id="wrapper">
        
        <h1 class="overlay-title" id="title">Click to Begin</h1>

        <video id="myVideo" autoplay playsinline>
            <source src="mp.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>

        <div class="black-curtain" id="curtain"></div>

    </div>

    <script>
        const video = document.getElementById('myVideo');
        const title = document.getElementById('title');
        const wrapper = document.getElementById('wrapper');
        const curtain = document.getElementById('curtain');
        const redirectUrl = 'main.html'; 

        video.addEventListener('play', function() {
            title.classList.add('hidden');
        });

        /* Cyberpunk Terminal Grid Crash Transition Hook */
        video.addEventListener('ended', function() {
            // Stage 1: Fast Cyan Blast Flash Layer
            curtain.classList.add('curtain-flash');

            setTimeout(function() {
                // Stage 2: Collapse Screen into Magenta warning line
                curtain.classList.add('curtain-collapse');
            }, 150);

            setTimeout(function() {
                // Stage 3: Terminal Screen Power Outage blackout
                curtain.classList.add('curtain-shutdown');
            }, 450);
            
            setTimeout(function() {
                window.location.href = redirectUrl;
            }, 850); 
        });

        wrapper.addEventListener('click', function() {
            if (video.paused) {
                video.play();
            }
        });
    </script>

</body>
</html>
