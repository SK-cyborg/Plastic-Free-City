<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="favicon (12).ico">
    <title>A Plastic-Free Future</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Container to stack video and text on top of each other */
        .video-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            opacity: 1;
            transition: opacity 1s ease; /* Handles the smooth 1-second fade-to-black */
        }

        /* The overlay title styled beautifully */
        .overlay-title {
            position: relative;
            z-index: 2;
            color: white;
            font-size: 2.5rem;
            font-weight: bold;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.8);
            text-align: center;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        /* Class to hide the title smoothly */
        .hidden {
            opacity: 0;
        }
    </style>
</head>
<body>

    <div class="video-container" id="wrapper">
        
        <h1 class="overlay-title" id="title">Click to Begin</h1>

        <video id="myVideo" autoplay playsinline>
            <source src="mp.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>

    </div>

    <script>
        const video = document.getElementById('myVideo');
        const title = document.getElementById('title');
        const wrapper = document.getElementById('wrapper');
        const redirectUrl = 'main.html'; 

        // 1. Hide title as soon as the video successfully starts playing
        video.addEventListener('play', function() {
            title.classList.add('hidden');
        });

        // 2. Fade to black when the video ends, then redirect after 1 second
        video.addEventListener('ended', function() {
            // Turn video transparent to show the black background behind it
            video.style.opacity = '0';
            
            // Wait exactly 1000 milliseconds (1 second) before swapping pages
            setTimeout(function() {
                window.location.href = redirectUrl;
            }, 1000); 
        });

        // 3. Click anywhere fallback to force play if autoplay was blocked
        wrapper.addEventListener('click', function() {
            if (video.paused) {
                video.play();
            }
        });
    </script>

</body>
</html>
