<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="favicon (12).ico">
    <title>A Plastic-Free Future</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Container to stack video, text, and fade-layer */
        .video-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* The overlay title styled beautifully */
        .overlay-title {
            position: relative;
            z-index: 2;
            color: white;
            font-size: 2.5rem;
            font-weight: bold;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.8);
            text-align: center;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        /* A solid black curtain that sits invisibly above the video */
        .black-curtain {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            z-index: 3; /* Sits on top of EVERYTHING */
            opacity: 0;
            pointer-events: none; /* Allows clicks to go through it */
            transition: opacity 1s ease-in-out; /* Super smooth transition */
        }

        /* Class to trigger the fade to black */
        .fade-in-black {
            opacity: 1;
        }

        /* Class to hide the title smoothly */
        .hidden {
            opacity: 0;
        }
    </style>
</head>
<body>

    <div class="video-container" id="wrapper">
        
        <h1 class="overlay-title" id="title">Click to Begin</h1>

        <video id="myVideo" autoplay playsinline>
            <source src="mp.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>

        <div class="black-curtain" id="curtain"></div>

    </div>

    <script>
        const video = document.getElementById('myVideo');
        const title = document.getElementById('title');
        const wrapper = document.getElementById('wrapper');
        const curtain = document.getElementById('curtain');
        const redirectUrl = 'main.html'; 

        // 1. Hide title as soon as the video successfully starts playing
        video.addEventListener('play', function() {
            title.classList.add('hidden');
        });

        // 2. Bring the black curtain down when the video ends, then redirect
        video.addEventListener('ended', function() {
            // Fade the black overlay IN over the video
            curtain.classList.add('fade-in-black');
            
            // Wait exactly 1000 milliseconds (1 second) for the fade to finish, then swap
            setTimeout(function() {
                window.location.href = redirectUrl;
            }, 1000); 
        });

        // 3. Click anywhere fallback to force play if autoplay was blocked
        wrapper.addEventListener('click', function() {
            if (video.paused) {
                video.play();
            }
        });
    </script>

</body>
</html>
